version: 1

defaults:
  save_dir: outputs/simulation_project
  n_jobs: 1
  method_jobs: 1
  seed: 20260415
  archive_artifacts: true
  skip_run_analysis: false

sweeps:
  exp1_to_exp5:
    experiment: all
    description: Unified full protocol run (Exp1 -> Exp5 -> analysis).
    fixed:
      all_parallel_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: nuts
      exp3_gigg_mode: paper_ref

  exp1_default:
    experiment: exp1
    description: Exp1 full protocol (repeats=500).
    fixed:
      repeats: 500

  exp2_default:
    experiment: exp2
    description: Exp2 default protocol (repeats=100, rho_ref fixed at 0.8).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: nuts

  exp3a_default:
    experiment: exp3a
    description: Exp3a default protocol (repeats=100, gigg_mode=paper_ref).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: nuts
      gigg_mode: paper_ref

  exp3b_default:
    experiment: exp3b
    description: Exp3b default protocol (repeats=100, gigg_mode=paper_ref).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: nuts
      gigg_mode: paper_ref

  exp4_default:
    experiment: exp4
    description: Exp4 default protocol (repeats=10, built-in retry default=1).
    fixed:
      repeats: 10
      method_jobs: 2
      enforce_bayes_convergence: true
      max_convergence_retries: 1
      until_bayes_converged: true
      sampler_backend: nuts

  exp5_default:
    experiment: exp5
    description: Exp5 default protocol (repeats=20, built-in retry default=5).
    fixed:
      repeats: 20
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: nuts
