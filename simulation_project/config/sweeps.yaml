version: 1

defaults:
  save_dir: outputs/simulation_project
  n_jobs: 1
  method_jobs: 1
  seed: 20260415

sweeps:
  exp1_to_exp5:
    experiment: all
    description: Unified default protocol run (Exp1 -> Exp5 -> analysis).
    fixed:
      all_parallel_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: collapsed
      exp3_gigg_mode: stable

  exp1_default:
    experiment: exp1
    description: Exp1 default protocol (repeats=500).
    fixed:
      repeats: 500

  exp2_default:
    experiment: exp2
    description: Exp2 default protocol (repeats=100, rho_ref fixed at 0.8).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: collapsed

  exp3a_default:
    experiment: exp3a
    description: Exp3a default protocol (repeats=100, gigg_mode=stable).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: collapsed
      gigg_mode: stable

  exp3b_default:
    experiment: exp3b
    description: Exp3b default protocol (repeats=100, gigg_mode=stable).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: collapsed
      gigg_mode: stable

  exp4_default:
    experiment: exp4
    description: Exp4 default protocol (repeats=30, built-in retry default=3).
    fixed:
      repeats: 30
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: collapsed

  exp5_default:
    experiment: exp5
    description: Exp5 default protocol (repeats=20, built-in retry default=5).
    fixed:
      repeats: 20
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      sampler_backend: collapsed

