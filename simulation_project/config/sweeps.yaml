version: 1

defaults:
  save_dir: outputs/simulation_project
  n_jobs: 1
  method_jobs: 1
  seed: 20260415
  archive_artifacts: true
  skip_run_analysis: false

sweeps:
  exp1_to_exp5:
    experiment: all
    description: Unified full protocol run (Exp1 -> Exp5 -> analysis).
    fixed:
      all_parallel_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      exp3_gigg_mode: paper_ref

  exp1_default:
    experiment: exp1
    description: Exp1 full protocol (repeats=500).
    fixed:
      repeats: 500

  exp2_default:
    experiment: exp2
    description: Exp2 default protocol (repeats=100, rho_ref fixed at 0.8).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true

  exp3a_default:
    experiment: exp3a
    description: Exp3a default protocol (repeats=100, gigg_mode=paper_ref).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      gigg_mode: paper_ref

  exp3b_default:
    experiment: exp3b
    description: Exp3b default protocol (repeats=100, gigg_mode=paper_ref).
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true
      gigg_mode: paper_ref

  exp4_default:
    experiment: exp4
    description: Exp4 default protocol (repeats=10, built-in retry default=1).
    fixed:
      repeats: 10
      method_jobs: 2
      enforce_bayes_convergence: true
      max_convergence_retries: 1
      until_bayes_converged: true

  exp5_default:
    experiment: exp5
    description: Exp5 default protocol (repeats=20, built-in retry default=5).
    fixed:
      repeats: 20
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true

  ga_v2a_default:
    experiment: ga_v2a
    description: GA-V2-A default protocol for mechanism-first group separation.
    fixed:
      repeats: 100
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true

  ga_v2a_quick:
    experiment: ga_v2a
    description: Lightweight GA-V2-A smoke/iteration sweep.
    fixed:
      repeats: 5
      method_jobs: 1
      enforce_bayes_convergence: true
      max_convergence_retries: 1
      until_bayes_converged: true

  ga_v2b_default:
    experiment: ga_v2b
    description: GA-V2-B default protocol across both complexity and within-group pattern axes.
    fixed:
      repeats: 40
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true

  ga_v2b_quickscan:
    experiment: ga_v2b
    description: Fast GA-V2-B scan over a reduced design for iteration.
    fixed:
      repeats: 3
      method_jobs: 1
      patterns:
        - few_groups
      within_group_patterns:
        - concentrated
        - distributed
      total_active_coeff: 10
      target_snr: 1.0
      enforce_bayes_convergence: true
      max_convergence_retries: 1
      until_bayes_converged: true

  ga_v2c_default:
    experiment: ga_v2c
    description: GA-V2-C default protocol across the within-group correlation grid.
    fixed:
      repeats: 30
      method_jobs: 2
      enforce_bayes_convergence: true
      until_bayes_converged: true

  ga_v2c_quickscan:
    experiment: ga_v2c
    description: Fast GA-V2-C correlation stress scan for iteration.
    fixed:
      repeats: 3
      method_jobs: 1
      rho_within_list:
        - 0.4
        - 0.8
      within_group_patterns:
        - concentrated
        - distributed
      active_groups:
        - 0
        - 1
      target_snr: 1.0
      enforce_bayes_convergence: true
      max_convergence_retries: 1
      until_bayes_converged: true
