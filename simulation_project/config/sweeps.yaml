version: 1

defaults:
  save_dir: simulation_project
  n_jobs: 1
  seed: 20260415

sweeps:
  exp1_tau_phase:
    experiment: exp1
    description: Sweep Exp1 null/phase tau settings and phase xi multipliers.
    fixed:
      repeats: 100
      tail_eps: 0.1
      alpha_kappa: 0.5
      beta_kappa: 1.0
      pg_null_list: [10, 20, 50, 100, 200, 500]
      pg_phase_list: [30, 60, 120, 240]
      xi_multiplier_list: [0.3, 0.5, 0.7, 0.85, 0.95, 1.05, 1.15, 1.3, 1.5, 2.0]
    grid:
      tau_null: [0.3, 0.5, 0.8]
      tau_phase_list:
        - [0.1, 0.3, 0.5, 1.0]
        - [0.2, 0.5, 1.0, 1.5]

  exp2_backend_profile:
    experiment: exp2
    description: Sweep Exp2 across profiles and GR_RHS backend.
    fixed:
      repeats: 30
      enforce_bayes_convergence: true
      until_bayes_converged: false
      max_convergence_retries: 2
      n_test: 100
    grid:
      profile: [laptop, full]
      sampler_backend: [nuts, collapsed]
      rho_ref: [0.1]

  exp3_signal_design:
    experiment: exp3
    description: Sweep Exp3 signal/rho/snr sub-grids for development and full checks.
    fixed:
      repeats: 20
      enforce_bayes_convergence: true
      until_bayes_converged: false
      max_convergence_retries: 2
      n_test: 100
      sampler_backend: nuts
    grid:
      profile: [laptop]
      signal_types:
        - [concentrated, boundary]
        - [concentrated, distributed, boundary]
      rho_list:
        - [0.0, 0.3]
        - [0.0, 0.3, 0.8]
      snr_list:
        - [0.7, 2.0]
        - [0.3, 0.7, 2.0]

  exp4_tau_ablation:
    experiment: exp4
    description: Sweep Exp4 p0 settings and sampler backend.
    fixed:
      repeats: 20
      profile: laptop
      enforce_bayes_convergence: true
      until_bayes_converged: false
      max_convergence_retries: 2
    grid:
      sampler_backend: [collapsed, nuts]
      p0_list:
        - [5, 15, 40]
        - [2, 8, 20]

  exp5_prior_quality:
    experiment: exp5
    description: Sweep Exp5 prior grids and retry budget under high-quality settings.
    fixed:
      repeats: 10
      profile: laptop
      enforce_bayes_convergence: true
      until_bayes_converged: false
      sampler_backend: nuts
    grid:
      max_convergence_retries: [2, 3]
      prior_grid:
        - [[0.5, 1.0], [1.0, 1.0], [0.5, 0.5], [2.0, 5.0], [1.0, 3.0]]
        - [[0.5, 1.0], [1.0, 1.0], [1.0, 3.0]]
