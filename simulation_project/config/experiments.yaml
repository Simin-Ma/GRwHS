exp1_kappa_profile_regimes:
  repeats_default: 500
  description: >
    Exp1 - kappa_g profile regimes (Theorems 3.22, 3.32, Corollary 3.33).
    Panel A: null contraction slope check E[kappa_g|Y]=O(p_g^{-1/2}).
    Panel B: phase curve P(kappa_g>u0|Y) versus xi/xi_crit.

exp2_group_separation:
  repeats_default: 100
  description: >
    Exp2 - group separation toy aligned to Exp3 scale (Theorem 3.34).
    group_sizes=[10,10,10,10,10], rho_ref=0.8,
    xi_ratios=[0.0,1.0,2.0,5.0,10.0], n_train=100, n_test=30,
    rho_within=0.8, rho_between=0.2, methods=[GR_RHS,RHS].
    Main summary uses paired-converged-and-ok subset.

exp3a_main_benchmark:
  repeats_default: 100
  description: >
    Exp3a - paper-aligned fixed-coefficient benchmark (GIGG Section 5.1 / Table 1).
    p=50 with fixed settings=[C10H,D10H,C10M,D10M,C5,D5,C25,D25,CL,DL,CS,DS].
    Training/test sample sizes stay on the project defaults.
    rho_within in {0.8,0.6} as specified by each label, rho_between=0.2.
    Residual variance calibrated to beta'Sigma beta / (beta'Sigma beta + sigma2) = 0.7.
    Methods=[GR_RHS,RHS,GIGG_MMLE,GHS_plus,OLS,LASSO_CV].
    Main summary uses paired-converged-and-ok subset.

exp3b_boundary_stress:
  repeats_default: 100
  description: >
    Exp3b - boundary stress (boundary signal with xi/xi_crit grid).
    Axes: rho_within=[0.8], rho_between=0.2, SNR=[0.2,1.0,5.0], rw>rb.
    Methods=[GR_RHS,RHS,GIGG_MMLE,GHS_plus,OLS,LASSO_CV].
    Main summary uses paired-converged-and-ok subset.

exp3c_highdim_stress:
  repeats_default: 30
  description: >
    Exp3c - high-dimensional stress benchmark with paper-style random coefficients.
    n=200, p=500 via 50 groups of size 10; first group is always active and the
    remaining groups are sampled as concentrated/distributed/null with probabilities
    0.2/0.2/0.6. rho_within=0.8, rho_between=0.2, and
    beta'Sigma beta / (beta'Sigma beta + sigma2) = 0.7.
    Methods=[GR_RHS,RHS,GIGG_MMLE,GHS_plus,OLS,LASSO_CV].
    Main summary uses paired-converged-and-ok subset.

exp3d_within_group_mixed:
  repeats_default: 100
  description: >
    Exp3d - legacy boundary-focused stress benchmark under the generic Exp3 protocol.
    Historical experiment key/path remains exp3d_within_group_mixed, but the
    current design is boundary-only with default group configs [G10x5, CL, CS].
    Axes: rho_within=[0.8], rho_between=0.2, SNR=[0.2,1.0,5.0], rw>rb.
    Not part of the paper-aligned fixed-coefficient / random-coefficient redesign.
    Methods=[GR_RHS,RHS,GIGG_MMLE,GHS_plus,OLS,LASSO_CV].
    Main summary uses paired-converged-and-ok subset.

exp4_variant_ablation:
  repeats_default: 10
  description: >
    Exp4 - GR-RHS variant ablation with oracle reference.
    p0_list=[5,15,30], include_oracle=true, sampler routing: p0=5->collapsed,
    otherwise use sampler_backend (default nuts).
    Summary uses converged-and-ok rows only.

exp5_prior_sensitivity:
  repeats_default: 20
  description: >
    Exp5 - prior sensitivity with paired design across priors.
    Reports paired deltas and 95% intervals relative to default prior (0.5,1.0).
    Main summary uses paired-converged-and-ok subset.
