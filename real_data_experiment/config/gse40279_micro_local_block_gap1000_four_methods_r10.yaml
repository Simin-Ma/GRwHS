package: real_data_experiment
description: Ten-repeat four-method run on the GSE40279 local-methylation-block micro variant.

methods:
  roster:
    - OLS
    - GHS_plus
    - RHS
    - GR_RHS
  grrhs_kwargs:
    tau_target: groups
    progress_bar: false

runner:
  output_dir: outputs/history/real_data_experiment/gse40279_micro_local_block_gap1000_four_methods_r10
  seed: 20260427
  n_jobs: 1
  method_jobs: 1
  build_tables: true
  save_splits: true
  baseline_method: RHS
  required_metrics_for_pairing:
    - rmse_test
    - mae_test
    - lpd_test
    - r2_test

datasets:
  - dataset_id: gse40279_age_local_block_micro_gap1000
    label: GSE40279 Methylation Age (micro, local block gap1000)
    description: Exploratory local methylation block variant with 200 CpGs grouped by genomic proximity.
    loader:
      path_X: data/real/gse40279_methylation_age/processed/runner_ready_micro_local_block_gap1000/X.npy
      path_y: data/real/gse40279_methylation_age/processed/runner_ready_micro_local_block_gap1000/y.npy
      path_feature_names: data/real/gse40279_methylation_age/processed/runner_ready_micro_local_block_gap1000/feature_names.txt
      path_group_map: data/real/gse40279_methylation_age/processed/runner_ready_micro_local_block_gap1000/group_map.json
      path_group_labels: data/real/gse40279_methylation_age/processed/runner_ready_micro_local_block_gap1000/group_labels.txt
    task: gaussian
    methods:
      - OLS
      - GHS_plus
      - RHS
      - GR_RHS
    target_label: chronological_age
    target_transform: none
    response_standardization: train_center
    covariate_mode: none
    p0_strategy: sqrt_p
    p0_groups_strategy: half_groups
    test_fraction: 0.2
    repeats: 10
    shuffle: true
    notes: >
      Ten-repeat comparison for the local methylation block grouping derived from
      genomic proximity with a 1000bp adjacency threshold and no per-group hard cap
      during preprocessing.
