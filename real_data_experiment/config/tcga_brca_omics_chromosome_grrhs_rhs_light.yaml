package: real_data_experiment
description: Lightweight convergence-first GR-RHS vs RHS run on TCGA-BRCA omics-by-chromosome groups.

convergence_gate:
  enforce_bayes_convergence: true
  max_convergence_retries: -1
  bayes_min_chains: 2
  chains: 2
  warmup: 200
  post_warmup_draws: 200
  adapt_delta: 0.92
  max_treedepth: 12
  strict_adapt_delta: 0.97
  strict_max_treedepth: 14
  rhat_threshold: 1.02
  ess_threshold: 100.0
  max_divergence_ratio: 0.01

methods:
  roster:
    - GR_RHS
    - RHS
  grrhs_kwargs:
    tau_target: groups
    progress_bar: false
  gigg_config:
    allow_budget_retry: false
    extra_retry: 0
    no_retry: true

runner:
  output_dir: outputs/history/real_data_experiment/tcga_brca_omics_chromosome_grrhs_rhs_light
  seed: 20260501
  n_jobs: 1
  method_jobs: 1
  build_tables: true
  save_splits: true
  baseline_method: RHS
  required_metrics_for_pairing:
    - rmse_test
    - mae_test
    - lpd_test
    - r2_test

datasets:
  - dataset_id: tcga_brca_xena_multiomics_age_omics_chromosome
    label: TCGA-BRCA Xena Multi-Omics Age (omics x chromosome)
    description: Lightweight GR-RHS vs RHS comparison on disjoint omics-by-chromosome groups.
    loader:
      path_X: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/X.npy
      path_y: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/y.npy
      path_feature_names: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/feature_names.txt
      path_group_map: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/group_map.json
      path_group_labels: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/group_labels.txt
    task: gaussian
    methods:
      - GR_RHS
      - RHS
    target_label: age_at_initial_pathologic_diagnosis
    target_transform: none
    response_standardization: train_center
    covariate_mode: none
    p0_strategy: sqrt_p
    p0_groups_strategy: sqrt_groups
    test_fraction: 0.2
    repeats: 1
    shuffle: true
    notes: Smoke-scale real-data check; Bayesian rows are interpreted only if status=ok and converged=true.
