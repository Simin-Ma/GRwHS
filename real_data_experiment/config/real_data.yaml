package: real_data_experiment
description: Real-data comparison suite for GR-RHS and baseline methods.

convergence_gate:
  enforce_bayes_convergence: true
  max_convergence_retries: -1
  bayes_min_chains: 4
  chains: 4
  warmup: 250
  post_warmup_draws: 250
  adapt_delta: 0.9
  max_treedepth: 12
  strict_adapt_delta: 0.95
  strict_max_treedepth: 14
  rhat_threshold: 1.01
  ess_threshold: 200.0
  max_divergence_ratio: 0.01

methods:
  roster:
    - GR_RHS
    - RHS
    - GHS_plus
    - GIGG_MMLE
    - LASSO_CV
    - OLS
  grrhs_kwargs:
    tau_target: groups
    progress_bar: false
  gigg_config:
    allow_budget_retry: true
    extra_retry: 0
    no_retry: true

runner:
  output_dir: outputs/history/real_data_experiment/main
  seed: 20260426
  n_jobs: 1
  method_jobs: 1
  build_tables: true
  save_splits: true
  baseline_method: RHS
  required_metrics_for_pairing:
    - rmse_test
    - mae_test
    - lpd_test
    - r2_test

datasets:
  - dataset_id: nhanes_2003_2004
    label: NHANES 2003-2004 GGT
    description: Environmental exposure regression on NHANES complete-case adults.
    loader:
      path_X: data/real/nhanes_2003_2004/processed/runner_ready/X.npy
      path_C: data/real/nhanes_2003_2004/processed/runner_ready/C.npy
      path_y: data/real/nhanes_2003_2004/processed/runner_ready/y.npy
      path_feature_names: data/real/nhanes_2003_2004/processed/runner_ready/feature_names.txt
      path_covariate_feature_names: data/real/nhanes_2003_2004/processed/runner_ready/covariate_feature_names.txt
      path_group_map: data/real/nhanes_2003_2004/processed/runner_ready/group_map.json
    task: gaussian
    methods:
      - GR_RHS
      - RHS
      - GHS_plus
      - GIGG_MMLE
      - LASSO_CV
      - OLS
    group_labels:
      - metals
      - phthalates
      - organochlorines
      - pbdes
      - pahs
    target_label: gamma_glutamyl_transferase
    target_transform: none
    response_standardization: train_center
    covariate_mode: residualize
    p0_strategy: sqrt_p
    p0_groups_strategy: half_groups
    test_fraction: 0.2
    repeats: 10
    shuffle: true
    notes: Uses train-only covariate residualization; held-out metrics are evaluated after adding the nuisance prediction back to the original y scale.

  - dataset_id: covid19_trust_experts
    label: COVID-19 Trust Experts
    description: Regression on the sparsegl trust_experts real-data design matrix.
    loader:
      path_X: data/real/covid19_trust_experts/processed/runner_ready/X.npy
      path_y: data/real/covid19_trust_experts/processed/runner_ready/y.npy
      path_feature_names: data/real/covid19_trust_experts/processed/runner_ready/feature_names.txt
      path_group_map: data/real/covid19_trust_experts/processed/runner_ready/group_map.json
    task: gaussian
    methods:
      - GR_RHS
      - RHS
      - GHS_plus
      - GIGG_MMLE
      - LASSO_CV
      - OLS
    group_labels:
      - period
      - region
      - age
      - gender
      - raceethnicity
      - cli_spline
      - hh_cmnty_cli_spline
    target_label: trust_experts
    target_transform: none
    response_standardization: train_center
    covariate_mode: none
    p0_strategy: sqrt_p
    p0_groups_strategy: half_groups
    test_fraction: 0.2
    repeats: 10
    shuffle: true
    notes: Direct grouped-design comparison without extra covariates.

  - dataset_id: gse40279_age_gene_groups_smoke
    label: GSE40279 Methylation Age (smoke)
    description: Human methylation-age regression with disjoint single-gene proxy groups from 450k CpGs.
    loader:
      path_X: data/real/gse40279_methylation_age/processed/runner_ready_smoke/X.npy
      path_y: data/real/gse40279_methylation_age/processed/runner_ready_smoke/y.npy
      path_feature_names: data/real/gse40279_methylation_age/processed/runner_ready_smoke/feature_names.txt
      path_group_map: data/real/gse40279_methylation_age/processed/runner_ready_smoke/group_map.json
      path_group_labels: data/real/gse40279_methylation_age/processed/runner_ready_smoke/group_labels.txt
    task: gaussian
    methods:
      - GR_RHS
      - RHS
    target_label: chronological_age
    target_transform: none
    response_standardization: train_center
    covariate_mode: none
    p0_strategy: sqrt_p
    p0_groups_strategy: half_groups
    test_fraction: 0.2
    repeats: 2
    shuffle: true
    notes: Smoke runner uses top-variance CpGs grouped by a single-gene proxy derived from the Illumina 450k UCSC_RefGene_Name annotation.

  - dataset_id: gse40279_age_gene_groups_micro
    label: GSE40279 Methylation Age (micro)
    description: Micro runner-verification subset from GSE40279 with the same grouping rule but 200 CpGs.
    loader:
      path_X: data/real/gse40279_methylation_age/processed/runner_ready_micro/X.npy
      path_y: data/real/gse40279_methylation_age/processed/runner_ready_micro/y.npy
      path_feature_names: data/real/gse40279_methylation_age/processed/runner_ready_micro/feature_names.txt
      path_group_map: data/real/gse40279_methylation_age/processed/runner_ready_micro/group_map.json
      path_group_labels: data/real/gse40279_methylation_age/processed/runner_ready_micro/group_labels.txt
    task: gaussian
    methods:
      - GR_RHS
      - RHS
    target_label: chronological_age
    target_transform: none
    response_standardization: train_center
    covariate_mode: none
    p0_strategy: sqrt_p
    p0_groups_strategy: half_groups
    test_fraction: 0.2
    repeats: 1
    shuffle: true
    notes: Micro runner is a lightweight real-data closure check derived from the same GSE40279 preprocessing pipeline as the 2000-feature smoke asset.

  - dataset_id: tcga_brca_xena_multiomics_age_blocks
    label: TCGA-BRCA Xena Multi-Omics Age
    description: TCGA breast cancer primary-tumor multi-omics regression from UCSC Xena with mRNA, miRNA, and gene-level copy-number blocks.
    loader:
      path_X: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_blocks/X.npy
      path_y: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_blocks/y.npy
      path_feature_names: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_blocks/feature_names.txt
      path_group_map: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_blocks/group_map.json
      path_group_labels: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_blocks/group_labels.txt
    task: gaussian
    methods:
      - GR_RHS
      - RHS
      - GHS_plus
      - GIGG_MMLE
      - LASSO_CV
      - OLS
    target_label: age_at_initial_pathologic_diagnosis
    target_transform: none
    response_standardization: train_center
    covariate_mode: none
    p0_strategy: sqrt_p
    p0_groups_strategy: half_groups
    test_fraction: 0.2
    repeats: 10
    shuffle: true
    notes: Runner-ready open-access TCGA-BRCA benchmark prepared by scripts/prepare_tcga_brca_xena_multiomics.py; PAM50 labels are retained in the analysis bundle for future subtype experiments.

  - dataset_id: tcga_brca_xena_multiomics_age_omics_chromosome
    label: TCGA-BRCA Xena Multi-Omics Age (omics x chromosome)
    description: TCGA breast cancer primary-tumor multi-omics regression using disjoint omics-by-chromosome groups from UCSC Xena mRNA, miRNA, and gene-level copy-number data.
    loader:
      path_X: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/X.npy
      path_y: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/y.npy
      path_feature_names: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/feature_names.txt
      path_group_map: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/group_map.json
      path_group_labels: data/real/tcga_brca_xena_multiomics/processed/runner_ready_age_omics_chromosome/group_labels.txt
    task: gaussian
    methods:
      - GR_RHS
      - RHS
      - GHS_plus
      - GIGG_MMLE
      - LASSO_CV
      - OLS
    target_label: age_at_initial_pathologic_diagnosis
    target_transform: none
    response_standardization: train_center
    covariate_mode: none
    p0_strategy: sqrt_p
    p0_groups_strategy: half_groups
    test_fraction: 0.2
    repeats: 10
    shuffle: true
    notes: Disjoint refinement of omics-level blocks by chromosome. HGNC maps mRNA/CNV gene symbols; miRBase v22 maps mature miRNA MIMAT accessions. Unmapped or ambiguous features are excluded from this refined asset.
