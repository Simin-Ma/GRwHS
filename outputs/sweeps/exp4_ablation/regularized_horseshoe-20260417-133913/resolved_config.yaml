      tau: 1000
      a: 400
      c2: 400
      phi: 400
      gamma: 400
      lambda: 200
      b: 200
    max_mcse_over_sd: 0.1
    max_retries: 3
    retry_scale: 2.0
    auto_stop:
      enabled: true
      initial_scale: 0.35
      growth: 1.6
      max_scale: 2.0
      max_attempts: 4
    parameters:
    - beta
    - tau
    expected_blocks:
      default:
      - beta
      - tau
      grrhs_gibbs:
      - beta
      - tau
      - a
      - c2
      - lambda
      gigg:
      - beta
      - tau
      - gamma
      - lambda
      gigg_regression:
      - beta
      - tau
      - gamma
      - lambda
      regularized_horseshoe:
      - beta
      - tau
      - lambda
      rhs:
      - beta
      - tau
      - lambda
      regularised_horseshoe:
      - beta
      - tau
      - lambda
      horseshoe:
      - beta
      - tau
      - lambda
      hs:
      - beta
      - tau
      - lambda
    missing_policy: fail
    require_valid_diagnostics: true
    min_chains_for_rhat: 4
    fail_run_on_invalid_bayesian: true
    hmc:
      enabled: true
      models:
      - regularized_horseshoe
      - rhs
      - regularised_horseshoe
      max_divergences: 0
      min_ebfmi: 0.3
      max_treedepth_hits: 0
      require_present: true
  posterior_validation:
    enabled: true
    apply_to_bayesian_only: true
    sbc:
      enabled: true
      ks_pvalue_min: 0.05
      coverage_level: 0.9
      coverage_tolerance: 0.15
      min_coefficients: 8
      max_coefficients: 128
      fail_on_missing_truth: false
      fail_on_missing_draws: true
    ppc:
      enabled: true
      tail_prob: 0.025
      min_draws: 200
      fail_on_missing_draws: true
    seed_stability:
      enabled: true
      num_restarts: 2
      seed_stride: 1009
      max_beta_rel_l2: 0.15
      min_beta_cosine: 0.98
      tau_stability_mode: log_median
      max_tau_log_sd: 0.35
      max_tau_rel_sd: 0.2
      fail_on_missing_tau: false
  metrics:
    regression:
    - MLPD
    - PredictiveLogLikelihood
    - RMSE
    - MAE
    - PredictiveCoverage90
    - PredictiveIntervalWidth90
    - BetaRMSE
    - BetaPearson
    - GroupNormRMSE
    - GroupNormPearson
    - BetaCoverage90
    - ActiveBetaIntervalWidth90
    - MeanEffectiveNonzeros
    - EffectiveDoF
  reporting:
    comparison_metrics:
      regression:
      - RMSE
  runtime_profile: false
  focus_metrics:
    predictive:
    - RMSE
    - PredictiveLogLikelihood
    - MLPD
    selection:
    - AUC-PR
    - F1
    shrinkage:
    - MeanEffectiveNonzeros
    - EffectiveDoF
  group_metrics:
