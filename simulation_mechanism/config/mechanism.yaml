package: simulation_mechanism
description: Mechanism-first GR-RHS experiment suite defined by docs/grrhs_mechanism_experiment_design.md.
include_dense_ablation: false
runner:
  output_dir: outputs/history/simulation_mechanism/mechanism_main
  repeats: 10
  n_jobs: 1
  method_jobs: 1
  build_tables: true
methods:
  standard_methods:
    - GR_RHS
    - RHS
  ablation_variants:
    - GR_RHS
    - GR_RHS_fixed_10x
    - RHS_oracle
    - GR_RHS_oracle
    - GR_RHS_no_local_scales
    - GR_RHS_shared_kappa
    - GR_RHS_no_kappa
  prior_sensitivity_variants:
    - GR_RHS_prior_default
    - GR_RHS_prior_uniform
    - GR_RHS_prior_u_shape
    - GR_RHS_prior_moderate_null
    - GR_RHS_prior_aggressive_null
  prior_beta_sweep_variants:
    - GR_RHS_beta_sweep_b0_5
    - GR_RHS_beta_sweep_b1
    - GR_RHS_beta_sweep_b2
    - GR_RHS_beta_sweep_b3
    - GR_RHS_beta_sweep_b5
    - GR_RHS_beta_sweep_b8
  prior_alpha_sweep_variants:
    - GR_RHS_alpha_sweep_a0_25
    - GR_RHS_alpha_sweep_a0_5
    - GR_RHS_alpha_sweep_a1
    - GR_RHS_alpha_sweep_a2
