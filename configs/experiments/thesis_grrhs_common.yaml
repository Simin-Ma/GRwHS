defaults: "../base.yaml"

task: "regression"

experiments:
  repeats: 10
  coverage_level: 0.95
  bayesian_fairness:
    enabled: true
    disable_inner_cv: true
    enforce_shared_sampling_budget: false
    require_posterior_mean_summary: true
    disable_budget_retry: false
    sampling_budget:
      burn_in: 2000
      kept_draws: 2000
      thinning: 1
      num_chains: 4
  posterior_validation:
    enabled: false
  convergence:
    enabled: true
    max_retries: 6
    retry_scale: 2.0
  evaluation:
    predictive_density_mode: "strict"
    group_selection:
      true_nonzero_tol: 1.0e-8
      abs_threshold: 1.0e-3
      rel_threshold: 0.10
    mixed_signal:
      abs_threshold: 1.0e-3
      rel_threshold: 0.10
  metrics:
    regression:
      - RMSE
      - MAE
      - MLPD
      - PredictiveLogLikelihood
      - PredictiveCoverage90
      - PredictiveIntervalWidth90
      - BetaRMSE
      - BetaPearson
      - GroupNormRMSE
      - GroupNormMSE
      - GroupNormPearson
      - NullGroupMeanNorm
      - GroupTPR
      - GroupFPR
      - GroupF1
      - ActiveGroupSignalRMSE
      - ActiveGroupNoiseRMSE
      - ActiveGroupNoiseAbsMean
      - ActiveGroupNoiseFalseRetentionRate
      - BetaCoverage90
      - ActiveBetaCoverage90
      - InactiveBetaCoverage90
      - BetaIntervalWidth90
      - ActiveBetaIntervalWidth90
      - InactiveBetaIntervalWidth90
      - MeanEffectiveNonzeros
      - EffectiveDoF
  reporting:
    comparison_metrics:
      regression:
        - BetaRMSE
        - GroupNormMSE
        - NullGroupMeanNorm
        - ActiveGroupSignalRMSE
        - ActiveGroupNoiseAbsMean
        - GroupTPR
        - GroupFPR
        - GroupF1
        - RMSE
        - BetaCoverage90

splits:
  outer:
    n_splits: 2
    n_repeats: 1
    shuffle: true
    seed: 20260409
  inner:
    n_splits: 2
    shuffle: true
    seed: 20260410

inference:
  nuts:
    target_accept_prob: 0.995
    max_tree_depth: 13
