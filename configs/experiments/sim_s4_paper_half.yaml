defaults: "../base.yaml"

name: "sim_s4_paper_half_mixed"
task: "regression"

data:
  type: "synthetic"
  seed: 20260309
  n: 1300
  p: 120
  G: 7
  group_sizes: [15, 15, 20, 20, 15, 20, 15]
  correlation:
    type: "group_block"
    rho_in: 0.8
    rho_out: 0.2
  snr: 1.0
  signal:
    blueprint:
      - label: "dense_strong"
        groups: [0, 3]
        components:
          - name: "strong_majority"
            fraction: 0.75
            distribution: "choices"
            values: [1.5, 2.0, 2.5]
            sign: "mixed"
            tag: "strong"
      - label: "moderate_groups"
        groups: [2, 5]
        components:
          - name: "medium_signal"
            fraction: 0.35
            distribution: "choices"
            values: [0.8, 1.0, 1.2]
            sign: "mixed"
            tag: "medium"
      - label: "sparse_weak"
        groups: [1, 6]
        components:
          - name: "weak_singletons"
            count_range: [1, 2]
            distribution: "choices"
            values: [0.35, 0.5, 0.65]
            sign: "mixed"
            tag: "weak"

experiments:
  repeats: 3
  coverage_level: 0.9
  reporting:
    comparison_metrics:
      regression:
        - RMSE
        - MLPD
        - BetaRMSE
        - BetaPearson
        - GroupNormRMSE
        - AUC-PR
        - F1
        - BetaCoverage90
        - ActiveBetaIntervalWidth90
        - EffectiveDoF

splits:
  outer:
    mode: "holdout"
    train_size: 300
    test_size: 1000
    shuffle: true
    seed: 16039
  inner:
    n_splits: 5
    shuffle: true
    seed: 26039
