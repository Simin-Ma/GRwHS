defaults: "../base.yaml"

name: "sim_g5_grouped_mixed"
task: "regression"

data:
  type: "synthetic"
  seed: 20251201
  n: 1300
  p: 50
  G: 5
  group_sizes: [2, 5, 10, 10, 23]
  correlation:
    type: "group_block_random"
    rho_in_range: [0.01, 0.7]
    rho_out_range: [0.1, 0.3]
  snr: 1.0
  signal:
    background_noise:
      scale: 0.15
    blueprint:
      - label: "group1_signals"
        groups: [0]
        components:
          - name: "strong_effect"
            count: 1
            distribution: "uniform"
            low: 3.0
            high: 5.0
            sign: "mixed"
            tag: "strong"
          - name: "weak_effect"
            count: 1
            distribution: "uniform"
            low: 0.3
            high: 0.6
            sign: "mixed"
            tag: "weak"
      - label: "group3_signals"
        groups: [2]
        components:
          - name: "strong_effects"
            count: 2
            distribution: "uniform"
            low: 3.0
            high: 5.0
            sign: "mixed"
            tag: "strong"
          - name: "noise_looks_like_signal"
            count: 1
            distribution: "uniform"
            low: 2.0
            high: 3.0
            sign: "mixed"
            tag: "noise"
      - label: "group4_signals"
        groups: [3]
        components:
          - name: "strong_effects"
            count: 3
            distribution: "uniform"
            low: 3.0
            high: 5.0
            sign: "mixed"
            tag: "strong"
      - label: "group5_signals"
        groups: [4]
        components:
          - name: "strong_effects"
            count: 4
            distribution: "uniform"
            low: 3.0
            high: 5.0
            sign: "mixed"
            tag: "strong"
          - name: "noise_looks_like_signal"
            count: 2
            distribution: "uniform"
            low: 2.0
            high: 3.0
            sign: "mixed"
            tag: "noise"

experiments:
  repeats: 3
  coverage_level: 0.9
  reporting:
    comparison_metrics:
      regression:
        - RMSE
        - MLPD
        - BetaRMSE
        - BetaPearson
        - GroupNormRMSE
        - AUC-PR
        - F1
        - BetaCoverage90
        - ActiveBetaIntervalWidth90
        - EffectiveDoF

splits:
  outer:
    mode: "holdout"
    train_size: 300
    test_size: 1000
    shuffle: true
    seed: 9011
  inner:
    n_splits: 5
    shuffle: true
    seed: 7722
