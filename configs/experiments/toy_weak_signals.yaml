defaults: "../base.yaml"

name: "toy_weak_signals_main"
task: "regression"

data:
  type: "synthetic"
  seed: 20260401
  n: 560
  p: 40
  G: 5
  group_sizes: [8, 8, 8, 8, 8]
  correlation:
    type: "group_block_random"
    rho_out_range: [0.05, 0.05]
    rho_in_range: [0.25, 0.95]
    # Mechanism:
    # - Groups 1-2: moderately/highly correlated, many weak nonzeros.
    # - Group 3: very high correlation, pure-noise trap.
    rho_in_group_ranges:
      0: [0.75, 0.75]
      1: [0.75, 0.75]
      2: [0.95, 0.95]
      3: [0.25, 0.25]
      4: [0.25, 0.25]
  snr: 0.6
  signal:
    blueprint:
      - label: "weak_group_1"
        groups: [0]
        components:
          - name: "weak_many"
            count: 7
            distribution: "uniform"
            low: 0.15
            high: 0.35
            sign: "mixed"
            tag: "weak"
      - label: "weak_group_2"
        groups: [1]
        components:
          - name: "weak_many"
            count: 7
            distribution: "uniform"
            low: 0.15
            high: 0.35
            sign: "mixed"
            tag: "weak"

splits:
  outer:
    mode: "holdout"
    train_size: 60
    test_size: 500
    shuffle: true
    seed: 20260401
  inner:
    n_splits: 2
    shuffle: true
    seed: 20260401

experiments:
  repeats: 1
  reporting:
    comparison_metrics:
      regression:
        - RMSE
        - BetaRMSE
        - AUC-PR
        - F1
        - GroupNormRMSE
  posterior_validation:
    enabled: false
  bayesian_fairness:
    enforce_shared_sampling_budget: true
    sampling_budget:
      burn_in: 1000
      kept_draws: 1000
      thinning: 1
      num_chains: 4
  convergence:
    enabled: true
    max_rhat: 1.20
    min_ess: 20
    min_ess_by_block:
      beta: 50
      tau: 50
      phi: 20
      gamma: 20
      lambda: 20
      b: 20
    max_mcse_over_sd: 0.50
    max_retries: 0

