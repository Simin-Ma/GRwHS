defaults: "../base.yaml"

name: "toy_mechanism_main"
task: "regression"

data:
  type: "synthetic"
  seed: 20260331
  n: 540
  p: 24
  G: 4
  group_sizes: [6, 6, 6, 6]
  correlation:
    type: "group_block_random"
    rho_out_range: [0.0, 0.0]
    rho_in_range: [0.2, 0.95]
    # Mechanism: group 3 is a high-correlation pure-noise trap.
    rho_in_group_ranges:
      0: [0.25, 0.25]  # weak dispersed signal group
      1: [0.25, 0.25]  # spike group
      2: [0.95, 0.95]  # trap group (noise only, highly correlated)
      3: [0.25, 0.25]  # extra noise group
  snr: 1.0
  signal:
    blueprint:
      - label: "weak_disperse_group"
        groups: [0]
        components:
          - name: "weak_disperse"
            count: 4
            distribution: "uniform"
            low: 0.2
            high: 0.6
            sign: "mixed"
            tag: "weak"
      - label: "single_spike_group"
        groups: [1]
        components:
          - name: "spike"
            count: 1
            distribution: "constant"
            value: 2.5
            sign: "positive"
            tag: "strong"

splits:
  outer:
    mode: "holdout"
    train_size: 40
    test_size: 500
    shuffle: true
    seed: 20260331
  inner:
    n_splits: 2
    shuffle: true
    seed: 20260331

experiments:
  repeats: 1
  reporting:
    comparison_metrics:
      regression:
        - RMSE
        - BetaRMSE
        - GroupNormRMSE
  posterior_validation:
    enabled: false
  bayesian_fairness:
    enforce_shared_sampling_budget: true
    sampling_budget:
      burn_in: 1000
      kept_draws: 1000
      thinning: 1
      num_chains: 4
  convergence:
    enabled: true
    max_rhat: 1.20
    min_ess: 20
    min_ess_by_block:
      beta: 30
      tau: 30
      phi: 20
      gamma: 20
      lambda: 20
      b: 20
    max_mcse_over_sd: 0.50
    max_retries: 0
