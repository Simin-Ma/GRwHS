name: "bglss_mbsgs"

model:
  name: "bglss_mbsgs"
  # MBSGS::BGLSS iterations
  niter: 3000
  burnin: 1000
  fit_intercept: false
  # Keep false by default for speed/size; turn on if posterior diagnostics need draws.
  save_posterior_samples: false
  # Override if Rscript is not in PATH (e.g., "C:/Program Files/R/R-4.5.0/bin/Rscript.exe")
  rscript: "Rscript"
  timeout_sec: 1800
  verbose: false

inference:
  gibbs:
    seed: 2025
