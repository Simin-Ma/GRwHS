name: "grrhs_group_horseshoe"

model:
  name: "grrhs_nuts"
  eta: 0.5
  alpha_kappa: 0.5
  beta_kappa: 0.5
  s0: 1.0
  tau:
    mode: "calibrated"
    target: "coefficients"
    p0:
      value: 20
    sigma_reference: 1.0

inference:
  nuts:
    num_warmup: 1000
    num_samples: 1000
    num_chains: 4
    thinning: 1
    target_accept_prob: 0.95
    max_tree_depth: 12
    dense_mass: true
    chain_method: "sequential"
    seed: 321
