name: "grrhs_regression"

model:
  name: "grrhs_nuts"
  eta: 1.0
  alpha_kappa: 0.5
  beta_kappa: 1.0
  s0: 1.0
  tau:
    mode: "calibrated"
    target: "coefficients"
    p0:
      value: 20
    sigma_reference: 1.0

inference:
  nuts:
    num_warmup: 1000
    num_samples: 1000
    num_chains: 4
    thinning: 1
    target_accept_prob: 0.95
    max_tree_depth: 12
    dense_mass: false
    chain_method: "sequential"
    seed: 321

experiments:
  bayesian_fairness:
    disable_budget_retry: false
  convergence:
    max_retries: 6
    auto_stop:
      enabled: true
      initial_scale: 8.0
      growth: 2.0
      max_scale: 16.0
      max_attempts: 2
      continuation: false
      force_include_baseline: false
