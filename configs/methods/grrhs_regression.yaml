name: "grrhs_regression"

model:
  name: "grrhs_gibbs"
  c: 1.0
  eta: 0.5
  s0: 1.0
  iters: 8000
  tau:
    mode: "calibrated"
    target: "coefficients"
    p0:
      value: 20
    sigma_reference: 1.0
    sigma_classification: 2.0

inference:
  gibbs:
    burn_in: 4000
    thin: 2
    num_chains: 2
    jitter: 1.0e-08
    seed: 321
