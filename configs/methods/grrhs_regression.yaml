name: "grrhs_regression"

model:
  name: "grrhs_gibbs"
  c: 1.0
  eta: 0.7
  tau0: 0.00641500299099584
  s0: 1.0
  iters: 8000
  tau:
    mode: "calibrated"
    target: "coefficients"
    p0:
      value: 24
    sigma_reference: 1.0
    sigma_classification: 2.0
  search:
    strategy: "bayes"
    budget: 6
    init_points: 3
    random_candidates: 128
    seed: 321
    runtime_overrides:
      model:
        iters: 2500
      inference:
        gibbs:
          burn_in: 1250
    space:
      c:
        mode: "logspace"
        low: 0.5
        high: 4.0
      eta:
        mode: "uniform"
        low: 0.2
        high: 1.5
      tau.p0.value:
        mode: "int"
        low: 8
        high: 60

inference:
  gibbs:
    burn_in: 4000
    thin: 2
    jitter: 1.0e-08
    seed: 321
