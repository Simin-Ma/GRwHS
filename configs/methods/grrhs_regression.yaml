name: "grrhs_regression"

model:
  name: "grrhs_gibbs"
  c: 1.0
  eta: 0.5
  s0: 1.0
  iters: 2000
  tau:
    mode: "calibrated"
    target: "coefficients"
    p0:
      value: 20
    sigma_reference: 1.0

inference:
  gibbs:
    burn_in: 1000
    thin: 1
    num_chains: 4
    tau_slice_w: 0.8
    tau_slice_m: 1200
    jitter: 1.0e-08
    seed: 321
