experiments:
  repeats: 1

  bayesian_fairness:
    enabled: true
    disable_inner_cv: true
    enforce_shared_sampling_budget: true
    require_posterior_mean_summary: true
    disable_budget_retry: false
    sampling_budget:
      burn_in: 8000
      kept_draws: 8000
      thinning: 1
      num_chains: 4

  convergence:
    enabled: true
    max_rhat: 1.01
    min_ess: 100
    min_ess_by_block:
      beta: 400
      tau: 1000
      phi: 400
      gamma: 400
      lambda: 200
      b: 200
    max_mcse_over_sd: 0.10
    max_retries: 3
    retry_scale: 2.0
    missing_policy: fail
    require_valid_diagnostics: true
    min_chains_for_rhat: 4
    fail_run_on_invalid_bayesian: true
    hmc:
      enabled: true
      models: ["regularized_horseshoe", "rhs", "regularised_horseshoe"]
      max_divergences: 0
      min_ebfmi: 0.3
      max_treedepth_hits: 0
      require_present: true

  posterior_validation:
    enabled: true
    apply_to_bayesian_only: true
    sbc:
      enabled: true
      ks_pvalue_min: 1.0e-30
      coverage_level: 0.9
      coverage_tolerance: 0.80
      min_coefficients: 8
      max_coefficients: 128
      fail_on_missing_truth: false
      fail_on_missing_draws: true
    ppc:
      enabled: true
      tail_prob: 0.025
      min_draws: 200
      fail_on_missing_draws: true
    seed_stability:
      enabled: true
      num_restarts: 2
      seed_stride: 1009
      max_beta_rel_l2: 0.15
      min_beta_cosine: 0.98
      tau_stability_mode: log_median
      max_tau_log_sd: 0.35
      max_tau_rel_sd: 0.20
      fail_on_missing_tau: false

inference:
  nuts:
    target_accept_prob: 0.999
    max_tree_depth: 14
