# ========================================
# Shared Nested-CV Base Configuration
# ========================================

seed: 42
device: "cpu"
output_dir: "outputs"
task: "regression"

seeds:
  experiment: 42
  split: 183729
  data_generation: null

standardization:
  X: "unit_variance"
  y_center: true

splits:
  outer:
    n_splits: 5
    n_repeats: 1
    shuffle: true
    stratify: "auto"
    seed: 20240501
  inner:
    n_splits: 5
    shuffle: true
    stratify: "auto"
    seed: 20240502

experiments:
  repeats: 1
  coverage_level: 0.9
  classification_threshold: 0.5
  bayesian_fairness:
    enabled: true
    disable_inner_cv: true
    enforce_shared_sampling_budget: true
    require_posterior_mean_summary: true
    disable_budget_retry: true
    sampling_budget:
      burn_in: 1000
      kept_draws: 1000
      thinning: 1
      num_chains: 1
  evaluation:
    predictive_density_mode: "strict"
  convergence:
    enabled: true
    max_rhat: 1.05
    max_retries: 1
    retry_scale: 2.0
    parameters: ["beta", "tau"]
    expected_blocks:
      default: ["beta", "tau"]
      grrhs_gibbs: ["beta", "tau", "phi", "lambda"]
      grrhs_gibbs_logistic: ["beta", "tau", "phi", "lambda"]
      grrhs_logistic: ["beta", "tau", "phi", "lambda"]
      grrhs_gibbs_cls: ["beta", "tau", "phi", "lambda"]
      gigg: ["beta", "tau", "gamma", "lambda"]
      gigg_regression: ["beta", "tau", "gamma", "lambda"]
      regularized_horseshoe: ["beta", "tau", "lambda"]
      rhs: ["beta", "tau", "lambda"]
      regularised_horseshoe: ["beta", "tau", "lambda"]
      horseshoe: ["beta", "tau", "lambda"]
      hs: ["beta", "tau", "lambda"]
    missing_policy: "warn"
    # Keep single-chain Bayesian runs comparable in sweep summaries.
    # With num_chains: 1, R-hat is not valid; treat that as a warning
    # instead of dropping the entire fold from downstream comparisons.
    require_valid_diagnostics: false
    min_chains_for_rhat: 2
  metrics:
    regression:
      - MLPD
      - PredictiveLogLikelihood
      - RMSE
      - MAE
      - PredictiveCoverage90
      - PredictiveIntervalWidth90
      - BetaRMSE
      - BetaPearson
      - GroupNormRMSE
      - GroupNormPearson
      - BetaCoverage90
      - ActiveBetaIntervalWidth90
      - MeanEffectiveNonzeros
      - EffectiveDoF
    classification:
      - MLPD
      - ClassLogLoss
      - ClassBrier
      - ClassAccuracy
      - ClassF1
      - ClassAUROC
      - ClassAveragePrecision
      - Coverage90
      - MeanEffectiveNonzeros
  reporting:
    comparison_metrics:
      regression:
        - RMSE
  runtime_profile: false
