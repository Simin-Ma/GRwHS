name: "real_nhanes_2003_2004_grrhs_refine"
output_dir: "outputs/sweeps/real_nhanes_2003_2004_grrhs_refine"

common_config_files:
  - "../experiments/real_nhanes_2003_2004_ggt.yaml"
  - "../methods/grrhs_regression.yaml"

common_overrides:
  model:
    iters: 8000
  inference:
    gibbs:
      burn_in: 4000
      thin: 2
  experiments:
    reporting:
      comparison_metrics:
        regression:
          - RMSE
          - MLPD
          - PredictiveLogLikelihood
          - EffectiveDoF
          - MeanEffectiveNonzeros

variations:
  - name: "grrhs_eta1p5_tau0p0096_c1p0"
    overrides:
      model:
        eta: 1.5
        tau0: 0.00962250448649376
        c: 1.0

  - name: "grrhs_eta1p5_tau0p0096_c2p0"
    overrides:
      model:
        eta: 1.5
        tau0: 0.00962250448649376
        c: 2.0

  - name: "grrhs_eta1p8_tau0p0096_c1p0"
    overrides:
      model:
        eta: 1.8
        tau0: 0.00962250448649376
        c: 1.0

  - name: "grrhs_eta1p8_tau0p0128_c2p0"
    overrides:
      model:
        eta: 1.8
        tau0: 0.01283000598199168
        c: 2.0
