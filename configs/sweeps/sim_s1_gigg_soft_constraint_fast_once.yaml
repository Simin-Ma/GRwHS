name: "sim_s1_gigg_soft_constraint_fast_once"
output_dir: "outputs/sweeps/sim_s1_gigg_soft_constraint_fast_once"

common_config_files:
  - "../experiments/sim_s1.yaml"
  - "../overrides/sim1_bayes_hardpass_ultra_operational.yaml"

variations:
  - name: "gigg_soft_fast"
    config_files:
      - "../methods/gigg.yaml"
    overrides:
      experiments:
        bayesian_fairness:
          sampling_budget:
            burn_in: 2000
            kept_draws: 2000
            thinning: 1
            num_chains: 4
      model:
        method: "fixed"
        mmle_enabled: false
        store_lambda: true
        stable_solve: true
        btrick: false
        n_samples: 2000
        lambda_constraint_mode: "soft"
        lambda_cap: 1000.0
        lambda_soft_cap: 1000.0
