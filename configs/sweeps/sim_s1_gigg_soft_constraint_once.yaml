name: "sim_s1_gigg_soft_constraint_once"
output_dir: "outputs/sweeps/sim_s1_gigg_soft_constraint_once"

common_config_files:
  - "../experiments/sim_s1.yaml"
  - "../overrides/sim1_bayes_hardpass_ultra_operational.yaml"

variations:
  - name: "gigg_soft"
    config_files:
      - "../methods/gigg.yaml"
    overrides:
      model:
        method: "fixed"
        mmle_enabled: false
        store_lambda: true
        stable_solve: true
        btrick: false
        lambda_constraint_mode: "soft"
        lambda_cap: 1000.0
        lambda_soft_cap: 1000.0
