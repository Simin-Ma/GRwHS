name: "thesis_stage1_scene1_bglss_only_cont_plus_model_threshold"
output_dir: "outputs/sweeps/thesis_stage1_scene1_bglss_only_cont_plus_model_threshold"

common_config_files:
  - "../experiments/thesis_stage1_scene1_highcol_groupdense.yaml"

variations:
  - name: "bglss_cont_plus_model_threshold"
    config_files:
      - "../methods/bglss_python.yaml"
    overrides:
      experiments:
        repeats: 3
        bayesian_fairness:
          enforce_shared_sampling_budget: true
          disable_budget_retry: false
          sampling_budget:
            burn_in: 1200
            kept_draws: 1200
            thinning: 1
            num_chains: 4
        convergence:
          max_retries: 4
          retry_scale: 1.5
          auto_stop:
            enabled: true
            initial_scale: 0.8
            growth: 1.5
            max_scale: 2.5
            max_attempts: 5
            continuation: true
            force_include_baseline: false
          max_rhat: 1.05
          max_mcse_over_sd: 0.12
          min_ess_by_block:
            beta: 100
            sigma2: 80
          by_model:
            bglss_python:
              max_rhat: 1.12
      model:
        update_tau: false
        replica_exchange:
          enabled: false
        init_beta_scale: 0.08
        init_tau2_log_sd: 0.4
