name: "real_nhanes_2003_2004_grrhs_sensitivity"
output_dir: "outputs/sweeps/real_nhanes_2003_2004_grrhs_sensitivity"

common_config_files:
  - "../experiments/real_nhanes_2003_2004_ggt.yaml"
  - "../methods/grrhs_regression.yaml"

common_overrides:
  model:
    iters: 4000
  inference:
    gibbs:
      burn_in: 2000
      thin: 2
  experiments:
    reporting:
      comparison_metrics:
        regression:
          - RMSE
          - MLPD
          - PredictiveLogLikelihood
          - EffectiveDoF
          - MeanEffectiveNonzeros

variations:
  - name: "grrhs_p0_12_eta_0p3"
    overrides:
      model:
        eta: 0.3
        tau:
          p0:
            value: 12
  - name: "grrhs_p0_12_eta_0p6"
    overrides:
      model:
        eta: 0.6
        tau:
          p0:
            value: 12
  - name: "grrhs_p0_12_eta_1p0"
    overrides:
      model:
        eta: 1.0
        tau:
          p0:
            value: 12
  - name: "grrhs_p0_20_eta_0p3"
    overrides:
      model:
        eta: 0.3
        tau:
          p0:
            value: 20
  - name: "grrhs_p0_20_eta_0p6"
    overrides:
      model:
        eta: 0.6
        tau:
          p0:
            value: 20
  - name: "grrhs_p0_20_eta_1p0"
    overrides:
      model:
        eta: 1.0
        tau:
          p0:
            value: 20
  - name: "grrhs_p0_32_eta_0p3"
    overrides:
      model:
        eta: 0.3
        tau:
          p0:
            value: 32
  - name: "grrhs_p0_32_eta_0p6"
    overrides:
      model:
        eta: 0.6
        tau:
          p0:
            value: 32
  - name: "grrhs_p0_32_eta_1p0"
    overrides:
      model:
        eta: 1.0
        tau:
          p0:
            value: 32
  - name: "grrhs_c_1p5_robustness"
    overrides:
      model:
        c: 1.5
        eta: 0.6
        tau:
          p0:
            value: 20
  - name: "grrhs_c_2p0_robustness"
    overrides:
      model:
        c: 2.0
        eta: 0.6
        tau:
          p0:
            value: 20
