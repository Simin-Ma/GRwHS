name: "real_nhanes_2003_2004_grrhs_tuning"
output_dir: "outputs/sweeps/real_nhanes_2003_2004_grrhs_tuning"

common_config_files:
  - "../experiments/real_nhanes_2003_2004_ggt.yaml"
  - "../methods/grrhs_regression.yaml"

common_overrides:
  model:
    iters: 4000
  inference:
    gibbs:
      burn_in: 2000
      thin: 2
  experiments:
    reporting:
      comparison_metrics:
        regression:
          - RMSE
          - MLPD
          - PredictiveLogLikelihood
          - EffectiveDoF
          - MeanEffectiveNonzeros

variations:
  - name: "grrhs_eta_0p3"
    overrides:
      model:
        eta: 0.3
  - name: "grrhs_eta_0p5"
    overrides:
      model:
        eta: 0.5
  - name: "grrhs_eta_1p0"
    overrides:
      model:
        eta: 1.0
  - name: "grrhs_eta_1p5"
    overrides:
      model:
        eta: 1.5

  - name: "grrhs_tau_0p0032"
    overrides:
      model:
        tau0: 0.00320750149549792
  - name: "grrhs_tau_0p0096"
    overrides:
      model:
        tau0: 0.00962250448649376
  - name: "grrhs_tau_0p0128"
    overrides:
      model:
        tau0: 0.01283000598199168

  - name: "grrhs_c_0p5"
    overrides:
      model:
        c: 0.5
  - name: "grrhs_c_2p0"
    overrides:
      model:
        c: 2.0
