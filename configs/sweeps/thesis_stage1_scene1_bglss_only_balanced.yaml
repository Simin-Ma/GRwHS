name: "thesis_stage1_scene1_bglss_only_balanced"
output_dir: "outputs/sweeps/thesis_stage1_scene1_bglss_only_balanced"

common_config_files:
  - "../experiments/thesis_stage1_scene1_highcol_groupdense.yaml"

variations:
  - name: "bglss"
    config_files:
      - "../methods/bglss_python.yaml"
    overrides:
      model:
        update_tau: false
      experiments:
        bayesian_fairness:
          enforce_shared_sampling_budget: true
          disable_budget_retry: false
          sampling_budget:
            burn_in: 1000
            kept_draws: 1000
            thinning: 1
            num_chains: 4
        convergence:
          max_retries: 1
          retry_scale: 1.4
          auto_stop:
            enabled: true
            initial_scale: 0.7
            growth: 1.5
            max_scale: 1.0
            max_attempts: 2
            continuation: false
            force_include_baseline: false
          max_rhat: 1.03
          min_ess_by_block:
            beta: 150
            sigma2: 100
