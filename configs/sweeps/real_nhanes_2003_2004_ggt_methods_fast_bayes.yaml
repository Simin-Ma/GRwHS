name: "real_nhanes_2003_2004_ggt_methods_fast_bayes"
output_dir: "outputs/sweeps/real_nhanes_2003_2004_ggt_fast_bayes"

common_config_files:
  - "../experiments/real_nhanes_2003_2004_ggt.yaml"

variations:
  - name: "nhanes_grrhs"
    config_files:
      - "../methods/grrhs_regression.yaml"
    override_cli:
      - "model.iters=4000"
      - "inference.gibbs.burn_in=2000"
      - "inference.gibbs.thin=2"
      - "inference.gibbs.num_chains=2"
      - "experiments.convergence.max_retries=0"

  - name: "nhanes_rhs"
    config_files:
      - "../methods/regularized_horseshoe.yaml"
    override_cli:
      - "model.num_warmup=600"
      - "model.num_samples=600"
      - "model.num_chains=2"
      - "model.thinning=1"
      - "model.target_accept_prob=0.9"
      - "experiments.convergence.max_retries=0"

  - name: "nhanes_group_horseshoe"
    config_files:
      - "../methods/group_horseshoe.yaml"
    override_cli:
      - "model.num_warmup=600"
      - "model.num_samples=600"
      - "model.num_chains=2"
      - "model.thinning=1"
      - "model.target_accept_prob=0.9"
      - "experiments.convergence.max_retries=0"

  - name: "nhanes_gigg"
    config_files:
      - "../methods/gigg.yaml"
    override_cli:
      - "model.iters=4000"
      - "inference.gibbs.burn_in=2000"
      - "inference.gibbs.thin=2"
      - "inference.gibbs.num_chains=2"
      - "experiments.convergence.max_retries=0"

  - name: "nhanes_group_lasso"
    config_files:
      - "../methods/group_lasso.yaml"

  - name: "nhanes_sgl"
    config_files:
      - "../methods/sparse_group_lasso.yaml"

  - name: "nhanes_lasso"
    config_files:
      - "../methods/lasso.yaml"

  - name: "nhanes_ridge"
    config_files:
      - "../methods/ridge.yaml"
