name: "audit_budget_sensitivity_grrhs"
output_dir: "outputs/sweeps/audit_budget_sensitivity_grrhs"

common_config_files:
  - "../experiments/exp1_group_regression.yaml"
  - "../methods/grrhs_regression.yaml"

common_overrides:
  experiments:
    repeats: 1

variations:
  - name: "grrhs_budget_1x"
    overrides:
      model:
        iters: 8000
      inference:
        gibbs:
          burn_in: 4000
  - name: "grrhs_budget_2x"
    overrides:
      model:
        iters: 16000
      inference:
        gibbs:
          burn_in: 8000
  - name: "grrhs_budget_4x"
    overrides:
      model:
        iters: 32000
      inference:
        gibbs:
          burn_in: 16000
