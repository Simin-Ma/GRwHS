name: "thesis_stage1_scene1_bglss_only_quality"
output_dir: "outputs/sweeps/thesis_stage1_scene1_bglss_only_quality"

common_config_files:
  - "../experiments/thesis_stage1_scene1_highcol_groupdense.yaml"

variations:
  - name: "bglss"
    config_files:
      - "../methods/bglss_python.yaml"
    overrides:
      model:
        update_tau: false
      experiments:
        bayesian_fairness:
          enforce_shared_sampling_budget: true
          disable_budget_retry: false
          sampling_budget:
            burn_in: 1500
            kept_draws: 1500
            thinning: 1
            num_chains: 4
        convergence:
          max_retries: 2
          retry_scale: 1.5
          auto_stop:
            enabled: true
            initial_scale: 0.8
            growth: 1.4
            max_scale: 1.4
            max_attempts: 3
            continuation: false
            force_include_baseline: false
          max_rhat: 1.05
          max_mcse_over_sd: 0.12
          min_ess_by_block:
            beta: 100
            sigma2: 80
