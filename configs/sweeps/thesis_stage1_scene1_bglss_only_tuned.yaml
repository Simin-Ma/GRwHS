name: "thesis_stage1_scene1_bglss_only_tuned"
output_dir: "outputs/sweeps/thesis_stage1_scene1_bglss_only_tuned"

common_config_files:
  - "../experiments/thesis_stage1_scene1_highcol_groupdense.yaml"

variations:
  - name: "bglss"
    config_files:
      - "../methods/bglss_python.yaml"
    overrides:
      model:
        update_tau: false
      experiments:
        bayesian_fairness:
          enforce_shared_sampling_budget: true
          disable_budget_retry: true
          sampling_budget:
            burn_in: 1000
            kept_draws: 1000
            thinning: 1
            num_chains: 4
        convergence:
          max_retries: 1
          auto_stop:
            enabled: false
          max_rhat: 1.02
          min_ess_by_block:
            beta: 200
            sigma2: 100
