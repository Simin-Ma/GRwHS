name: "audit_budget_sensitivity_bayesian_methods"
output_dir: "outputs/sweeps/audit_budget_sensitivity_bayesian_methods"

common_config_files:
  - "../experiments/exp1_group_regression.yaml"

common_overrides:
  experiments:
    repeats: 1

variations:
  - name: "grrhs_budget_1x"
    config_files:
      - "../methods/grrhs_regression.yaml"
  - name: "grrhs_budget_2x"
    config_files:
      - "../methods/grrhs_regression.yaml"
    overrides:
      model:
        iters: 16000
      inference:
        gibbs:
          burn_in: 8000
  - name: "grrhs_budget_4x"
    config_files:
      - "../methods/grrhs_regression.yaml"
    overrides:
      model:
        iters: 32000
      inference:
        gibbs:
          burn_in: 16000

  - name: "gigg_budget_1x"
    config_files:
      - "../methods/gigg.yaml"
  - name: "gigg_budget_2x"
    config_files:
      - "../methods/gigg.yaml"
    overrides:
      model:
        iters: 16000
      inference:
        gibbs:
          burn_in: 8000
  - name: "gigg_budget_4x"
    config_files:
      - "../methods/gigg.yaml"
    overrides:
      model:
        iters: 32000
      inference:
        gibbs:
          burn_in: 16000

  - name: "group_horseshoe_budget_1x"
    config_files:
      - "../methods/group_horseshoe.yaml"
  - name: "group_horseshoe_budget_2x"
    config_files:
      - "../methods/group_horseshoe.yaml"
    overrides:
      model:
        num_warmup: 4000
        num_samples: 4000
  - name: "group_horseshoe_budget_4x"
    config_files:
      - "../methods/group_horseshoe.yaml"
    overrides:
      model:
        num_warmup: 8000
        num_samples: 8000

  - name: "rhs_budget_1x"
    config_files:
      - "../methods/regularized_horseshoe.yaml"
  - name: "rhs_budget_2x"
    config_files:
      - "../methods/regularized_horseshoe.yaml"
    overrides:
      model:
        num_warmup: 4000
        num_samples: 4000
  - name: "rhs_budget_4x"
    config_files:
      - "../methods/regularized_horseshoe.yaml"
    overrides:
      model:
        num_warmup: 8000
        num_samples: 8000
