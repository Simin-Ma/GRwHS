name: "sim_s1_eight_models_with_bglss_ols"
output_dir: "outputs/sweeps/sim_s1_eight_models_with_bglss_ols"

common_config_files:
  - "../experiments/sim_s1.yaml"

common_overrides:
  experiments:
    convergence:
      enabled: true

variations:
  - name: "grrhs"
    config_files:
      - "../methods/grrhs_regression.yaml"
  - name: "rhs"
    config_files:
      - "../methods/regularized_horseshoe.yaml"
  - name: "gigg"
    config_files:
      - "../methods/gigg.yaml"
  - name: "bglss"
    config_files:
      - "../methods/bglss_python.yaml"
  - name: "sgl"
    config_files:
      - "../methods/sparse_group_lasso.yaml"
  - name: "lasso"
    config_files:
      - "../methods/lasso.yaml"
  - name: "ridge"
    config_files:
      - "../methods/ridge.yaml"
  - name: "ols"
    config_files:
      - "../methods/ols.yaml"
